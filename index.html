<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portal Consultor</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login" id="telaLogin">
    <div class="box">
      <h2>Portal Consultor</h2>

      <input type="email" id="email" placeholder="Email">
      <input type="password" id="senha" placeholder="Senha">

      <button onclick="login()">Entrar</button>

      <div id="resultado"></div>
    </div>
  </div>

  <div class="painel" id="painel">

    <div class="topo">
      <strong>Portal Consultor</strong>
      <span><span id="usuarioNome"></span> | <span id="usuarioPerfil"></span></span>
    </div>

    <div class="layout">

      <div class="menu">
        <button onclick="abrirPagina('inicio')">Início</button>

        <div id="menuAdmin">
          <button onclick="abrirPagina('usuarios')">Usuários</button>
          <button onclick="abrirPagina('cooperativas')">Cooperativas</button>
        </div>

        <button onclick="abrirPagina('conteudos')">Conteúdos</button>
        <button onclick="logout()">Sair</button>
      </div>

      <div class="conteudo" id="conteudo">
        <h1>Bem-vindo ao Portal</h1>
      </div>

    </div>
  </div>

 <!-- 1. Primeiro a biblioteca de gráficos (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- 2. Depois o SEU arquivo de lógica -->
    <script src="app.js"></script>
</body>
</html>
